# Dependabot: open PRs when @drk/design-system has a new version.
# See https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group patch and minor updates for the design system so one PR updates it
    groups:
      design-system:
        patterns:
          - "@drk/*"
