# Dependabot: automated dependency updates for this design system repo.
# Consuming apps: copy templates/dependabot.consuming-app.yml to your app as .github/dependabot.yml.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "@drkaachen/design-system-ui*"
      - dependency-name: "@drkaachen/content-sanity*"
      - dependency-name: "@drkaachen/next-site-runtime*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
