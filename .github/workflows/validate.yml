name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: AI guidance policy checks
        run: npm run check:ai-rules

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
